<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENCORETECH</title>
    
    <link rel="preconnect" href="https://googleapis.com">
    <link href="https://googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">  
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #22d3ee;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --font-family: 'Plus Jakarta Sans', sans-serif;
            --bg-dark: #0f172a;
            --color:grey;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }


        @keyframes meshMove {
            0% { transform: scale(1); }
            100% { transform: scale(1.2); }
        }

        /* Navbar Styling */
        .navbar {
            padding: 24px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
        }

        .logo {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            font-size: 0.85rem;
        }

        .nav-btn:hover {
            background: white;
            color: #0f172a;
            transform: translateY(-2px);
        }

        /* Login Card - Glassmorphism */
        .login-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            padding: 48px;
            border-radius: 32px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: cardAppear 0.8s ease-out;
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logintext {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .subtext {
            color: #94a3b8;
            margin-bottom: 32px;
            font-size: 0.95rem;
        }

        /* Inputs */
        .input-group {
            margin-bottom: 24px;
            text-align: left;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            color: #64748b;
            transition: 0.3s;
        }

        .rlogininput {
            width: 100%;
            padding: 16px 16px 16px 48px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.03);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .rlogininput:focus {
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }

        .rlogininput:focus + i {
            color: var(--primary);
        }

        /* Buttons */
        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 8px;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }
        .btn-submit:disabled {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            background:var(--color);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: none;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }


        .btn-submit:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
        }

        .btn-submit.secondary {
            background: transparent;
            border: 1px solid var(--glass-border);
            box-shadow: none;
        }

        .btn-submit.secondary:hover {
            background: var(--glass);
        }

        /* Floating Help Action */
        .fixed-call {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 20px;
            background: white;
            color: #0f172a;
            border: none;
            cursor: pointer;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
            font-weight: 900;
            animation:dynamics 10s linear infinite;
        }

        .fixed-call:hover {
            transform: rotate(15deg) scale(1.1);
        }

        @media (max-width: 480px) {
            .login-card { padding: 32px 24px; }
            .logo { font-size: 1.2rem; }
        }
        @keyframes dynamics{
            0%{
                transform:translateX(-20%) ; 
               border-radius:20%;
           }
            25%{
                transform:translateY(-30%) ; 
                border-radius:30%;
            }
            50%{
                transform:translateX(20%) ; 
                border-radius:40%;
            }
            100%{transform:translateY(30%) ;
             border-radius:50%;
         }
        }
         #show{
                position: absolute;
                top:2px;
                right:4.3px;
                bottom:2px;
                border:transparent;
                background: transparent;
                width:20%;
                color:white;
                font-family: 'Orbitron', sans-serif;
                text-transform: capitalize;
                cursor:pointer;
            }
            #sun{
                width:60px;
                font-size:50px;
                background-color: transparent;
                position: absolute;
                right:40px;
                top:20px;
                margin:0;
                border:none;
                text-align:center;
                cursor:pointer;

            }
            .sunc{
                position:relative;
                height:70px;
                background-color: transparent;
            }
            
    </style>
</head>
<body>
    

    <nav class="navbar">
        <div class="logo"></div>
        <div style="display: flex; gap: 12px;">
            <button class="nav-btn">Home</button>
            <button class="nav-btn">About</button>
            <button class="nav-btn" style="background: white; color: #0f172a;">Sign up</button>
        </div>
    </nav>
    <div class="sunc">
          <button id="sun" onclick="dark()">🌙</button>
    </div>
  
    
    <div class="login-container">
        <div class="login-card">
            <h1 class="logintext">Welcome Back</h1>
            <p class="subtext">Access your academic dashboard</p>
            
            <div class="input-group">
                <div class="input-wrapper">
                    <i data-lucide="hash"></i>
                    <input class="rlogininput" type="text" placeholder="Student ID Number" id="number">
                </div>
            </div>

            <div class="input-group">
                <div class="input-wrapper">
                    <i data-lucide="shield-check"></i>
                    <input class="rlogininput" type="password" placeholder=" Password" id="pwd">
                    <button id="show" onclick="toggle()">show</button>
                </div>
            </div>

            <div class="btn-stack">
                <button type="button" class="btn-submit" disabled id="bn">login</button>
                
            </div>
        </div>
    </div>

    <button class="fixed-call">
        <i data-lucide="message-square-text"><b>?</b></i>
    </button>

    <script>
         const pwd=document.getElementById("pwd");
        const btn=document.getElementById("show")
          const sun=document.getElementById("sun");
        

        function toggle(){
            if(pwd.type==="password"){
                pwd.type="text";
                show.innerHTML="hide"
            }
            else{
                var btn=document.getElementById("show")
                pwd.type="password";
                show.innerHTML="show"
            }
        }
         function dark(){
        if(document.body.style.backgroundColor=== 'var(--bg-dark)'){
            document.body.style.backgroundColor='orange'
            ;sun.innerHTML='🌞'
            sun.style.opacity=1
        }else if(document.body.style.backgroundColor=== 'var(--bg-dark)' || document.body.style.backgroundColor==='orange'){document.body.style.backgroundColor='violet'
            sun.innerHTML="🌟";}else{document.body.style.backgroundColor='var(--bg-dark)'
              sun.innerHTML='🌙'
               sun.sytle.opacity=0.5}
        }
        const num=document.getElementById("number");
        const bn=document.getElementById("bn");
        function check() {
            if (num.value!="" && pwd.value!=""){
                bn.disabled=false
            }else{
                bn.disabled=true
            }
        }
        pwd.addEventListener('input',check)
        num.addEventListener('input',check)
        </script>
</body>
</html>
